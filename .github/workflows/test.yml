name: Tests

on:
  pull_request:
    paths:
      - "**.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements*.txt"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v
