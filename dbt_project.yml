name: churn_pred
version: "1.0.0"
config-version: 2
profile: churn_pred

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

vars:
  # Resolved from CHURN_PRED_ROOT env var; defaults to cwd (Makefile invokes dbt
  # from the repo root, so "." works out of the box). Override if you run dbt
  # from a different directory: `export CHURN_PRED_ROOT=/path/to/churn-pred`.
  project_root: "{{ env_var('CHURN_PRED_ROOT', '.') }}"

models:
  churn_pred:
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    marts:
      +materialized: external
